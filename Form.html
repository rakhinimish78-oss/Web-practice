<!--
1) Start the HTML document with `<!DOCTYPE html>` to specify this is an HTML5 webpage.

2) Open the `<html>` tag to wrap the whole page.

3) Create the `<head>` section:
   a) Add `<meta charset="utf-8">` to support special characters.
   b) Add `<meta name="viewport" content="width=device-width">` to make the page responsive.
   c) Set the page title using `<title>replit</title>`.
   d) Link an external stylesheet using `<link href="style.css" rel="stylesheet" type="text/css" />`.

4) Create the `<body>` section:
   (All visible content is written here.)

5) Use `<fieldset>` to group related form elements inside a box.

6) Use `<legend>` to give the fieldset a title:
   a) Display "Enter your Marks" in bold.

7) Create a `<form>`:
   a) `action="/action_page.php"` specifies where form data will be sent when submitted.
   b) `oninput="..."` runs whenever the user types/changes any input in the form.

8) Use the `oninput` expression to calculate the average marks:
   a) Convert `m1`, `m2`, and `m3` values to integers using `parseInt(...)`.
   b) Add the three marks and divide by 3.
   c) Store the result into the output field using `x.value = (...)`.

9) Add a Name field:
   a) Use `<label>` to show "Name".
   b) Use `<input type="text" id="name">` to take the student's name.

10) Add marks input for Subject 1:
    a) Use a `<select>` dropdown to choose the subject (Maths/English/Science).
    b) Use `<input type="number" id="m1" name="m1">` to enter marks for subject 1.

11) Add marks input for Subject 2:
    a) Use another `<select>` dropdown for subject 2.
    b) Use `<input type="number" id="m2" name="m2">` to enter marks for subject 2.

12) Add marks input for Subject 3:
    a) Use another `<select>` dropdown for subject 3.
    b) Use `<input type="number" id="m3" name="m3">` to enter marks for subject 3.

13) Display the calculated average using the `<output>` tag:
    a) `name="x"` matches the variable used in the `oninput` calculation.
    b) `for="m1 m2 m3"` indicates the output depends on these inputs.

14) Close the `<form>`, `<fieldset>`, `<body>`, and `<html>` tags to complete the webpage.
-->
